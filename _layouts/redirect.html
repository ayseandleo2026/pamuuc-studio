---
layout: base
---
<main id="main" class="legal-main">
  <div class="container">
    <article class="legal-card">
      <h1>{{ page.redirect_title | default: "Redirecting" }}</h1>
      <p>{{ page.redirect_description | default: "This URL has moved to the canonical page below." }}</p>
      <p><a href="{{ page.redirect_to | relative_url }}">Continue to the canonical page</a></p>
    </article>
  </div>
</main>
<script>
  window.location.replace({{ page.redirect_to | relative_url | jsonify }});
</script>
